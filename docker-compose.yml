services:
  python:
    build:
      context: ./Python
      dockerfile: Dockerfile
    container_name: rebulid01-python
    networks:
      - rebulid01-network
    ports:
      - "8000:8000"
    environment:
      SQLITE_DB_PATH: /data/strava.sqlite
    volumes:
      - ./data:/data
      - ./Python:/app/Python

  web:
    build:
      context: ./web/muj-next-app
      dockerfile: Dockerfile
    container_name: rebulid01-web
    networks:
      - rebulid01-network
    depends_on:
      - python
    env_file:
      - ./web/muj-next-app/.env.local
    environment:
      PYTHON_API_URL: http://python:8000
      SQLITE_DB_PATH: /data/strava.sqlite
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./web/muj-next-app:/app
      - /app/node_modules
      - /app/.next

  mobile:
    build:
      context: ./mobile/my-app
      dockerfile: Dockerfile
    container_name: rebulid01-mobile
    networks:
      - rebulid01-network
    depends_on:
      - web
    env_file:
      - ./mobile/my-app/.env.local
    environment:
      EXPO_NO_TELEMETRY: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-192.168.50.214}
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true
    volumes:
      - ./mobile/my-app:/app
      - /app/node_modules
      - /app/.expo

networks:
  rebulid01-network:
    driver: bridge
